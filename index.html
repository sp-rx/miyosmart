<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Display</title>

  <style>
    body {
      margin: 0;
      background: #fff;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="your-image.jpg" alt="Image">
  </div>

</body>
</html>
