<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoya Miyosmart</title>

  <style>
    body {
      margin: 0;
      background: #fff;
      display: flex;
      justify-content: center;
  font-family: Montserrat, sans-serif;padding: 1.5rem;


    }

    .container {
      width: 100%;
      max-width: 840px;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
    }

    .img-wrap {
      position: relative;
    }

.price {
  position: fixed;
  bottom: 30px;

  left: 50%;
  transform: translateX(-50%);

  background: rgba(20, 20, 20, 0.35);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  padding: 16px 100px;
  border-radius: 14px;

  width: 450px;
  max-width: 450px;

  color: #fff;
  z-index: 999;

  font-family: Arial, sans-serif;
  letter-spacing: 1px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.08);

  font-size: 20px;
}

.row {
  display: flex;
  justify-content: space-between;
  gap: 50px;

  font-size: 14px;  /* 👈 bigger text */
  margin: 8px 0;
}

.label {
  opacity: 0.85;
  font-weight: 400;
}

.value {
  font-weight: 600;
}

.note {
  margin-top: 18px;
  font-size: 8px;
  opacity: 0.75;
  line-height: 1.3;
}

.disclaimer {
  margin-top: 10px;
  font-size: 7px;
  opacity: 0.55;
  line-height: 1.35;
}

.disclaimer strong {
  font-weight: 600;
}
  </style>
</head>
<body>

<div class="price">
  <div class="row">
    <span class="label">MIYOSMART</span>
    <span class="value">RM 1,300</span>
  </div>

  <div class="row">
    <span class="label">MIYOSMART Full Control coating</span>
    <span class="value">RM 1,400</span>
  </div>

  <div class="row">
    <span class="label">MIYOSMART Chameleon</span>
    <span class="value">RM 1,500</span>
  </div>

  <div class="note">
    All lenses come with UV protection. Price quoted in pair.
  </div>

  <div class="disclaimer">
    <strong>Disclaimer</strong><br>
    *Miyosmart with Full Control coating consists of the following HOYA coating products: BlueControl, UV Control and Bacteria Control
  </div>

</div>

  <div class="container">

  <img src="https://raw.githubusercontent.com/sp-rx/miyosmart/refs/heads/main/2.png">

    <img src="https://raw.githubusercontent.com/sp-rx/miyosmart/refs/heads/main/4.png">

    <img src="https://raw.githubusercontent.com/sp-rx/miyosmart/refs/heads/main/6.png">
    <img src="https://raw.githubusercontent.com/sp-rx/miyosmart/refs/heads/main/7.png">
<img src="https://raw.githubusercontent.com/sp-rx/miyosmart/refs/heads/main/8.png">
<img src="https://raw.githubusercontent.com/sp-rx/miyosmart/refs/heads/main/9.png">

</body>
</html>
